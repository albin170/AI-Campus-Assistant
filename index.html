<!DOCTYPE html>
<html>

<head>

<title>AI Campus Assistant</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<header>

<h1>AI Campus Assistant</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<button onclick="login()">Login with Google</button>

</header>


<nav>

<button onclick="openTab('chat')">AI Chatbot</button>

<button onclick="openTab('news')">Fake News Detector</button>

<button onclick="openTab('planner')">Study Planner</button>

</nav>


<!-- CHATBOT -->

<section id="chat" class="tab">

<h2>AI Chatbot</h2>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤</button>

</section>


<!-- FAKE NEWS -->

<section id="news" class="tab">

<h2>Fake News Detector</h2>

<textarea id="newsText" placeholder="Paste news text"></textarea>

<button onclick="analyzeNews()">Analyze</button>

<p id="score"></p>

</section>


<!-- STUDY PLANNER -->

<section id="planner" class="tab">

<h2>Study Planner</h2>

<input id="taskInput" placeholder="Enter task">

<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</section>


<script src="script.js"></script>
<script src="chatbot.js"></script>
<script src="news.js"></script>
<script src="planner.js"></script>
<script src="auth.js"></script>

</body>

</html>
